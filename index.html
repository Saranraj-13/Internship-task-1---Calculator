<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaranCalci - Modern Responsive Calculator</title>
  <!-- Google Fonts - Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Ambient background elements -->
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>

  <!-- Calculator Wrapper -->
  <div class="calculator-container">
    
    <!-- Calculator Card -->
    <main class="calculator">
      <!-- Calculator Header / Controls -->
      <header class="calc-header">
        <div class="brand">
          <span class="brand-dot"></span>
          <h1>SaranCalci</h1>
        </div>
        
        <div class="header-controls">
          <!-- Toggle Scientific Mode -->
          <button id="toggle-sci" class="icon-btn" title="Scientific Mode" aria-label="Toggle Scientific Mode">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>
          </button>
          
          <!-- History Drawer Button -->
          <button id="toggle-history" class="icon-btn" title="Calculation History" aria-label="Toggle History">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          </button>
          
          <!-- Theme Toggle Switch -->
          <button id="theme-toggle" class="icon-btn" title="Toggle Theme" aria-label="Toggle Light/Dark Theme">
            <!-- Moon Icon (Dark Mode active) -->
            <svg id="moon-icon" class="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <!-- Sun Icon (Light Mode active) -->
            <svg id="sun-icon" class="theme-icon hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          </button>
        </div>
      </header>

      <!-- Calculator Display -->
      <section class="calc-display">
        <div id="expression" class="expression-line" aria-live="polite"></div>
        <div id="result" class="result-line" aria-live="polite">0</div>
      </section>

      <!-- Calculator Keypad Container -->
      <div class="keypad-container">
        
        <!-- Scientific Panel (hidden by default) -->
        <section id="sci-panel" class="sci-keys hidden" aria-label="Scientific functions">
          <button class="btn btn-sci" data-action="sin">sin</button>
          <button class="btn btn-sci" data-action="cos">cos</button>
          <button class="btn btn-sci" data-action="tan">tan</button>
          <button class="btn btn-sci" data-action="power">x<sup>y</sup></button>
          <button class="btn btn-sci" data-action="sqrt">&radic;</button>
          <button class="btn btn-sci" data-action="log">log</button>
          <button class="btn btn-sci" data-action="ln">ln</button>
          <button class="btn btn-sci" data-action="factorial">x!</button>
          <button class="btn btn-sci" data-value="pi">&pi;</button>
          <button class="btn btn-sci" data-value="e">e</button>
        </section>

        <!-- Standard Keypad -->
        <section class="std-keys" aria-label="Standard keypad">
          <!-- Row 1 -->
          <button class="btn btn-action" data-action="clear" id="key-clear">C</button>
          <button class="btn btn-action" data-action="backspace" id="key-backspace" aria-label="Backspace">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0 -2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
          </button>
          <button class="btn btn-action" data-action="percent">%</button>
          <button class="btn btn-operator" data-value="/" aria-label="Divide">&divide;</button>

          <!-- Row 2 -->
          <button class="btn btn-num" data-value="7">7</button>
          <button class="btn btn-num" data-value="8">8</button>
          <button class="btn btn-num" data-value="9">9</button>
          <button class="btn btn-operator" data-value="*" aria-label="Multiply">&times;</button>

          <!-- Row 3 -->
          <button class="btn btn-num" data-value="4">4</button>
          <button class="btn btn-num" data-value="5">5</button>
          <button class="btn btn-num" data-value="6">6</button>
          <button class="btn btn-operator" data-value="-" aria-label="Subtract">&minus;</button>

          <!-- Row 4 -->
          <button class="btn btn-num" data-value="1">1</button>
          <button class="btn btn-num" data-value="2">2</button>
          <button class="btn btn-num" data-value="3">3</button>
          <button class="btn btn-operator" data-value="+" aria-label="Add">&plus;</button>

          <!-- Row 5 -->
          <button class="btn btn-num" data-action="negate">&plusmn;</button>
          <button class="btn btn-num" data-value="0">0</button>
          <button class="btn btn-num" data-value=".">.</button>
          <button class="btn btn-equals" data-action="calculate" id="key-equals" aria-label="Equals">=</button>
        </section>
      </div>

      <!-- History Drawer (Overlay Panel) -->
      <aside id="history-drawer" class="history-drawer" aria-label="Calculation History Log">
        <div class="drawer-header">
          <h2>History</h2>
          <button id="clear-history" class="text-btn">Clear All</button>
        </div>
        <div id="history-list" class="history-list">
          <!-- Dynamic history entries will be injected here -->
          <div class="empty-history">No calculations yet</div>
        </div>
      </aside>

    </main>
  </div>

  <!-- Notification Toast for errors -->
  <div id="toast" class="toast hidden" role="alert" aria-live="assertive"></div>

  <!-- Script -->
  <script src="script.js"></script>
</body>
</html>
